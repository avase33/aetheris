apiVersion: v1
kind: Namespace
metadata:
  name: aetheris
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aetheris-config
  namespace: aetheris
data:
  AETHERIS_ENV: "production"
  AETHERIS_BUS: "redis"
  REDIS_URL: "redis://redis:6379"
  AETHERIS_LOG_JSON: "true"
---
# ---------- Redis ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: aetheris }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: aetheris }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
# ---------- Gateway ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: gateway, namespace: aetheris }
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/avase33/aetheris:latest
          env:
            - { name: SERVICE, value: "gateway" }
            - { name: VISION_URL, value: "http://vision-edge:8000" }
            - { name: AGENTS_URL, value: "http://agent-orchestrator:8000" }
            - { name: PRIVACY_URL, value: "http://data-privacy-proxy:8000" }
            - { name: MLOPS_URL, value: "http://mlops-drift-watcher:8000" }
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /health, port: 8000 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 8000 }, initialDelaySeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: gateway, namespace: aetheris }
spec:
  type: LoadBalancer
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 8000 }]
---
# ---------- vision-edge ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: vision-edge, namespace: aetheris }
spec:
  replicas: 3
  selector: { matchLabels: { app: vision-edge } }
  template:
    metadata: { labels: { app: vision-edge } }
    spec:
      containers:
        - name: vision-edge
          image: ghcr.io/avase33/aetheris:latest
          envFrom: [{ configMapRef: { name: aetheris-config } }]
          env: [{ name: SERVICE, value: "vision" }]
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /health, port: 8000 } }
          resources: { requests: { cpu: "250m", memory: "256Mi" }, limits: { cpu: "1", memory: "512Mi" } }
---
apiVersion: v1
kind: Service
metadata: { name: vision-edge, namespace: aetheris }
spec: { selector: { app: vision-edge }, ports: [{ port: 8000, targetPort: 8000 }] }
---
# ---------- agent-orchestrator ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: agent-orchestrator, namespace: aetheris }
spec:
  replicas: 2
  selector: { matchLabels: { app: agent-orchestrator } }
  template:
    metadata: { labels: { app: agent-orchestrator } }
    spec:
      containers:
        - name: agent-orchestrator
          image: ghcr.io/avase33/aetheris:latest
          envFrom: [{ configMapRef: { name: aetheris-config } }]
          env: [{ name: SERVICE, value: "agents" }]
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /health, port: 8000 } }
---
apiVersion: v1
kind: Service
metadata: { name: agent-orchestrator, namespace: aetheris }
spec: { selector: { app: agent-orchestrator }, ports: [{ port: 8000, targetPort: 8000 }] }
---
# ---------- data-privacy-proxy ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: data-privacy-proxy, namespace: aetheris }
spec:
  replicas: 2
  selector: { matchLabels: { app: data-privacy-proxy } }
  template:
    metadata: { labels: { app: data-privacy-proxy } }
    spec:
      containers:
        - name: data-privacy-proxy
          image: ghcr.io/avase33/aetheris:latest
          env:
            - { name: SERVICE, value: "privacy" }
            - { name: AETHERIS_LLM, value: "mock" }
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /health, port: 8000 } }
---
apiVersion: v1
kind: Service
metadata: { name: data-privacy-proxy, namespace: aetheris }
spec: { selector: { app: data-privacy-proxy }, ports: [{ port: 8000, targetPort: 8000 }] }
---
# ---------- mlops-drift-watcher ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: mlops-drift-watcher, namespace: aetheris }
spec:
  replicas: 2
  selector: { matchLabels: { app: mlops-drift-watcher } }
  template:
    metadata: { labels: { app: mlops-drift-watcher } }
    spec:
      containers:
        - name: mlops-drift-watcher
          image: ghcr.io/avase33/aetheris:latest
          envFrom: [{ configMapRef: { name: aetheris-config } }]
          env: [{ name: SERVICE, value: "mlops" }]
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /health, port: 8000 } }
---
apiVersion: v1
kind: Service
metadata: { name: mlops-drift-watcher, namespace: aetheris }
spec: { selector: { app: mlops-drift-watcher }, ports: [{ port: 8000, targetPort: 8000 }] }
---
# ---------- Horizontal Pod Autoscaler for the CV workhorse ----------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: vision-edge-hpa, namespace: aetheris }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: vision-edge }
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
