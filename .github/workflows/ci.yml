name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev + server extras)
        run: pip install -e ".[dev,server]"
      - name: Run tests
        run: pytest -q
      - name: Offline end-to-end demo
        run: python -m aetheris demo
      - name: Import every service app
        run: |
          python -c "import aetheris.gateway.api, aetheris.vision.api, aetheris.agents.api, aetheris.privacy.api, aetheris.mlops.api; print('all service apps import OK')"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t aetheris:ci .

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kubernetes manifests
        run: |
          pip install pyyaml
          python -c "import yaml; docs=list(yaml.safe_load_all(open('deploy/k8s/aetheris.yaml'))); print(f'k8s YAML parses OK ({len(docs)} objects)')"
